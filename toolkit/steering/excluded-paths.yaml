# ============================================================================
# SECURITY NOTES
# ============================================================================
#
# DEFENSE IN DEPTH:
# This is one layer of security. Also use:
#   1. scan-secrets.yaml - Scans files before save
#   2. pre-send-scan.yaml - Final validation before transmission
#   3. region-config.yaml - Network-level data residency controls
#
# WHY EXCLUDE ENTIRE DIRECTORIES:
# - secrets/ and vault/ directories are ASSUMED to contain secrets
# - Even if a file passes secret scanning, exclude for defense in depth
# - Better safe than sorry - exclude entire sensitive directories
#
# DEPENDENCIES AND NOISE:
# - node_modules/ excluded for performance (too large) and security (transitive secrets)
# - Build artifacts excluded because they're generated and might contain embedded secrets
#
# COMPLIANCE:
# - Meets data residency requirements (excluded data never leaves device)
# - Supports GDPR (PII in excluded directories never transmitted)
# - Supports PCI DSS (cardholder data in excluded paths never sent)
# - Audit trail: All exclusions logged, can be reviewed
#
# TESTING YOUR EXCLUSIONS:
# 1. Create a test file matching an excluded pattern
# 2. Add a fake secret to it
# 3. Try to send it as context
# 4. Verify it's blocked with clear message
#
# PERFORMANCE:
# - Pattern matching is fast (compiled regex, < 10ms typical)
# - Large files are pre-filtered by size before pattern matching
# - Directory exclusions are checked first (most efficient)
#
# MAINTENANCE:
# - Review this file quarterly
# - Update patterns as new secret formats emerge
# - Add patterns after any security incident involving leaked secrets
# - Share patterns across teams (version control this file!)
