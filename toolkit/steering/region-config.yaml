version: "1.0"
last_updated: "2024-06-17"
last_reviewed_by: "Security Team"
next_review_date: "2024-09-17"  # Quarterly review recommended

# ============================================================================
# COMPLIANCE NOTES
# ============================================================================
#
# GDPR (European Union):
# - Data residency: Use EU regions only (eu-west-1, eu-central-1)
# - PII filtering: Required (enable pii_filter)
# - Data Processing Agreement: Ensure AWS BAA/DPA in place
# - Data subject rights: Document how to handle deletion requests
# - Reference: https://aws.amazon.com/compliance/gdpr-center/
#
# HIPAA (Healthcare - United States):
# - Data residency: US regions only (us-east-1, us-west-2)
# - BAA Required: Sign Business Associate Agreement with AWS
# - PHI Protection: Enable pii_filter for Protected Health Information
# - Audit logging: Required (enable audit_enabled)
# - Reference: https://aws.amazon.com/compliance/hipaa-compliance/
#
# PCI DSS (Payment Card Industry):
# - Cardholder data: NEVER send to model (use excluded-paths.yaml)
# - PII filtering: Enable for cardholder names, addresses
# - Audit logging: Required
# - Network segmentation: Use dedicated AWS account for PCI environment
# - Reference: https://aws.amazon.com/compliance/pci-dss-level-1-faqs/
#
# FSI (Financial Services - United States):
# - OCC, FDIC, Federal Reserve oversight
# - Data residency: US-only recommended (us-east-1 single region best)
# - Change management: Document and approve all config changes
# - Audit trail: 7-year retention (SOX requirement)
# - Incident response: Document process for data breach
#
# SOC 2 (Service Organization Control):
# - Security: Enable all guardrails
# - Availability: Configure failover and retry
# - Confidentiality: Enable PII filtering and topic denial
# - Processing integrity: Enable response validation
# - Privacy: Document data handling in data_residency section
#
# FedRAMP (US Government):
# - Regions: GovCloud ONLY (us-gov-west-1, us-gov-east-1)
# - ATO Required: Obtain Authority to Operate
# - Impact level: Choose IL2, IL4, IL5, or IL6 based on data classification
# - Continuous monitoring: Enable comprehensive audit logging
# - Reference: https://aws.amazon.com/compliance/fedramp/
#
# CCPA (California Consumer Privacy Act):
# - Applies to California residents
# - PII filtering: Recommended
# - Data subject rights: Document deletion and access processes
# - Do not sell: Ensure no data sent to third parties (Bedrock is first-party AWS)
#
# DEFENSE IN DEPTH:
# Region configuration is ONE layer. Also use:
# 1. excluded-paths.yaml - Prevent sensitive files from reaching model
# 2. scan-secrets.yaml - Scan files locally before save
# 3. pre-send-scan.yaml - Final validation before transmission
# 4. IAM policies - Restrict which teams can use which regions
# 5. Network controls - VPC endpoints, PrivateLink for Bedrock
#
# TESTING YOUR CONFIGURATION:
# 1. Send test request with PII → verify it's filtered
# 2. Try non-allowed region → verify it's blocked
# 3. Send denied topic → verify it's rejected
# 4. Check audit logs → verify all events are logged
# 5. Compliance audit → Generate report for auditors
#
# MAINTENANCE:
# - Review quarterly (every 3 months)
# - Update after any regulatory change
# - Update after any security incident
# - Update when new Bedrock regions become available
# - Share across teams (version control this file!)
#
# MONITORING AND ALERTS:
# Set up alerts for:
# - Guardrail triggers (may indicate data leak attempt)
# - Region violations (someone trying non-allowed region)
# - PII detection rate (if suddenly high, investigate)
# - Failed requests (may indicate misconfiguration)
#
# INCIDENT RESPONSE:
# If sensitive data reaches model despite controls:
# 1. Immediately revoke API keys/credentials
# 2. Review audit logs to determine scope
# 3. Notify compliance team and DPO (if GDPR)
# 4. Document in incident report
# 5. Update steering rules to prevent recurrence
# 6. Consider regulatory reporting (breach notification)
