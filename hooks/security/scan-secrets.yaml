# Security Hook: Gitleaks Secret Scanning
#
# PURPOSE: Local-first secret detection using gitleaks before any file reaches the model.
#          Blocks context with detected secrets to prevent data leakage.
#
# REQUIREMENTS ADDRESSED:
# - 3.1: Local secret scanning with gitleaks before model access
# - 3.7: Inline customization guidance
# - 15.2: Clear customization points with examples
#
# ============================================================================
# CUSTOMIZATION GUIDE
# ============================================================================
#
# REQUIRED CHANGES:
# 1. Install gitleaks: https://github.com/gitleaks/gitleaks#installation
#    - macOS: brew install gitleaks
#    - Linux: Download from releases page
#    - Windows: choco install gitleaks or download binary
#
# 2. Update SCAN_PATHS below to match your repository structure:
#    - Default scans: src/, lib/, config/, scripts/
#    - Add your application directories (e.g., api/, services/, lambda/)
#
# OPTIONAL CHANGES:
# 3. Custom gitleaks configuration:
#    - Create .gitleaks.toml in repository root for custom rules
#    - See: https://github.com/gitleaks/gitleaks#configuration
#
# 4. Whitelist false positives:
#    - Append "# gitleaks:allow" to lines that are safe (e.g., examples in docs)
#    - Or use .gitleaksignore file with file patterns
#
# 5. Adjust scanning depth:
#    - Default: scans staged + unstaged changes
#    - Add --no-git flag to scan entire directory tree (slower but comprehensive)
#
# VALIDATION:
# - Run: gitleaks detect --source . --verbose
# - Should see: "No leaks detected" or specific findings with line numbers
#
# TROUBLESHOOTING:
# - "gitleaks: command not found" → Install gitleaks (see step 1)
# - False positives → Use inline "# gitleaks:allow" comment
# - Slow scanning → Reduce SCAN_PATHS to critical directories only
# ============================================================================

name: scan-secrets-gitleaks
description: |
  Local secret scanning using gitleaks before files are sent to model context.
  Detects AWS keys, API tokens, private keys, database credentials, and 100+ secret patterns.
  Runs entirely on developer machine - no network calls, no data transmission.

on:
  file_save:
    # CUSTOMIZE: Adjust paths to match your repository structure
    paths:
      - "src/**/*"           # Source code
      - "lib/**/*"           # Libraries
      - "config/**/*"        # Configuration files
      - "scripts/**/*"       # Scripts and automation
      - "**/*.env*"          # Environment files (catches .env, .env.local, etc.)
      - "**/*.yaml"          # YAML configurations
      - "**/*.yml"           # YML configurations
      - "**/*.json"          # JSON configurations
      - "**/*.tf"            # Terraform files
      - "**/*.tfvars"        # Terraform variables
      
  context_send:
    # Also scan before any context is transmitted to model
    always: true

run:
  # Local execution - no model involved, zero data transmission
  command: |
    #!/bin/bash
    set -euo pipefail
    
    # CUSTOMIZE: Update these variables for your environment
    SCAN_PATHS="${KIRO_CHANGED_FILES:-src lib config scripts}"
    GITLEAKS_CONFIG="${GITLEAKS_CONFIG:-.gitleaks.toml}"
    
    echo "🔍 Scanning for secrets using gitleaks..."
    echo "Paths: $SCAN_PATHS"
    
    # Check if gitleaks is installed
    if ! command -v gitleaks &> /dev/null; then
      echo "❌ ERROR: gitleaks not found"
      echo ""
      echo "Install gitleaks:"
      echo "  macOS:   brew install gitleaks"
      echo "  Linux:   Download from https://github.com/gitleaks/gitleaks/releases"
      echo "  Windows: choco install gitleaks"
      exit 1
    fi
    
    # Build gitleaks command
    GITLEAKS_CMD="gitleaks detect --source ."
    
    # Use custom config if it exists
    if [ -f "$GITLEAKS_CONFIG" ]; then
      GITLEAKS_CMD="$GITLEAKS_CMD --config $GITLEAKS_CONFIG"
      echo "Using custom config: $GITLEAKS_CONFIG"
    fi
    
    # Add verbose output for detailed findings
    GITLEAKS_CMD="$GITLEAKS_CMD --verbose --redact"
    
    # Run gitleaks scan
    if $GITLEAKS_CMD; then
      echo "✅ No secrets detected - safe to proceed"
      exit 0
    else
      EXIT_CODE=$?
      echo ""
      echo "❌ SECRETS DETECTED - Context blocked for security"
      echo ""
      echo "Findings:"
      echo "  - Check gitleaks output above for specific locations"
      echo "  - Each finding shows: file, line number, secret type"
      echo ""
      echo "How to fix:"
      echo "  1. Remove secrets from code"
      echo "  2. Use environment variables or secret management (AWS Secrets Manager, etc.)"
      echo "  3. For false positives: add '# gitleaks:allow' comment to the line"
      echo ""
      echo "Example false positive whitelist:"
      echo "  const EXAMPLE_KEY = 'AKIAIOSFODNN7EXAMPLE' // gitleaks:allow"
      exit $EXIT_CODE
    fi

on_failure: block_context
# block_context: Prevents file from being included in model context
# This ensures secrets never reach the model, protecting against data leakage

# ADDITIONAL SECURITY LAYERS:
# 1. Combine with scan-secrets-regex.yaml for zero-dependency fallback
# 2. Use excluded-paths.yaml to prevent entire directories (secrets/, vault/) from reaching model
# 3. Use pre-send-scan.yaml for final validation before context transmission
# 4. Consider pre-commit hooks for additional protection at git commit time

# PERFORMANCE NOTES:
# - Gitleaks typically scans in <1 second for changed files
# - Full repository scan may take 5-30 seconds depending on size
# - Scanning happens locally - no network latency

# COMPLIANCE NOTES:
# - Satisfies data residency requirements (all processing local)
# - No secrets transmitted to any external service
# - Audit trail: gitleaks output shows what was detected and where
# - PCI DSS: Prevents cardholder data in code
# - SOX: Prevents credentials in source control
