# Security Hook: Zero-Dependency Regex Secret Scanning
#
# PURPOSE: Lightweight secret detection using pure regex patterns - no external dependencies.
#          Ideal for environments where gitleaks cannot be installed or as a fast fallback.
#
# REQUIREMENTS ADDRESSED:
# - 3.2: Zero-dependency alternative using pure regex patterns
# - 3.7: Inline customization guidance
# - 15.2: Clear customization points with examples
#
# ============================================================================
# CUSTOMIZATION GUIDE
# ============================================================================
#
# NO INSTALLATION REQUIRED - This hook uses only bash/grep (universally available)
#
# REQUIRED CHANGES:
# 1. Update SCAN_PATHS to match your repository structure:
#    - Default: scans src/, config/, lib/, scripts/
#    - Add your application directories
#
# OPTIONAL CHANGES:
# 2. Add organization-specific secret patterns:
#    - See "CUSTOM PATTERNS" section below
#    - Follow existing pattern format: "pattern_name|regex_pattern|severity"
#
# 3. Adjust severity levels:
#    - CRITICAL: Blocks immediately (AWS keys, private keys, database passwords)
#    - HIGH: Blocks with option to override (API tokens, connection strings)
#    - MEDIUM: Warns but allows (generic passwords in test files)
#
# 4. Whitelist false positives:
#    - Append "# nosecret" or "# secret:allow" to safe lines
#    - Examples: Documentation, test fixtures, example configurations
#
# VALIDATION:
# - Run: bash hooks/security/scan-secrets-regex.yaml
# - Test with known secret pattern in a temporary file
# - Verify detection and clear output formatting
#
# EXAMPLES OF PATTERNS TO ADD:
# - Internal API format: "internal_api|your-company-[a-z0-9]{32}|CRITICAL"
# - Custom key format: "custom_key|YOURPREFIX[A-Z0-9]{20}|HIGH"
# - Database connection: "db_connection|your-db://.*:.*@|CRITICAL"
#
# PERFORMANCE:
# - Scans ~1000 files/second (significantly faster than gitleaks)
# - Trade-off: Less sophisticated pattern matching, more false positives
# - Best for: Quick feedback during development
# ============================================================================

name: scan-secrets-regex
description: |
  Zero-dependency secret scanning using regex patterns.
  Fast, lightweight alternative to gitleaks requiring no external tools.
  Detects common secret patterns: AWS keys, GitHub tokens, private keys, API keys, 
  database credentials, JWT tokens, and more.

on:
  file_save:
    # CUSTOMIZE: Adjust to your repository structure
    paths:
      - "src/**/*"
      - "lib/**/*"
      - "config/**/*"
      - "scripts/**/*"
      - "**/*.env*"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.sh"
      - "**/*.py"
      - "**/*.js"
      - "**/*.ts"
      
  context_send:
    always: true

run:
  command: |
    #!/bin/bash
    set -euo pipefail
    
    # CUSTOMIZE: Update these paths for your repository
    SCAN_PATHS="${KIRO_CHANGED_FILES:-src lib config scripts}"
    SEVERITY_THRESHOLD="${SEVERITY_THRESHOLD:-HIGH}"
    
    echo "🔍 Scanning for secrets using regex patterns..."
    echo "Paths: $SCAN_PATHS"
    echo "Severity threshold: $SEVERITY_THRESHOLD"
    
    # Secret detection patterns (pattern_name|regex|severity)
    # Format: "DESCRIPTION|PATTERN|SEVERITY"
    declare -a PATTERNS=(
      # ========== CRITICAL SEVERITY (Always block) ==========
      # AWS Credentials
      "AWS Access Key|AKIA[0-9A-Z]{16}|CRITICAL"
      "AWS Secret Key|aws_secret_access_key['\"]?\s*[:=]\s*['\"]?[A-Za-z0-9/+=]{40}|CRITICAL"
      "AWS Session Token|AWSSessionToken['\"]?\s*[:=]\s*['\"]?[A-Za-z0-9/+=]{100,}|CRITICAL"
      
      # Private Keys
      "RSA Private Key|-----BEGIN RSA PRIVATE KEY-----|CRITICAL"
      "DSA Private Key|-----BEGIN DSA PRIVATE KEY-----|CRITICAL"
      "EC Private Key|-----BEGIN EC PRIVATE KEY-----|CRITICAL"
      "OpenSSH Private Key|-----BEGIN OPENSSH PRIVATE KEY-----|CRITICAL"
      "PGP Private Key|-----BEGIN PGP PRIVATE KEY BLOCK-----|CRITICAL"
      
      # Database Connections (with passwords)
      "PostgreSQL Connection|postgres(ql)?://[^:]+:[^@]+@|CRITICAL"
      "MySQL Connection|mysql://[^:]+:[^@]+@|CRITICAL"
      "MongoDB Connection|mongodb(\+srv)?://[^:]+:[^@]+@|CRITICAL"
      "Redis Connection|redis://[^:]+:[^@]+@|CRITICAL"
      
      # Generic Database Passwords
      "Database Password|database_password['\"]?\s*[:=]\s*['\"]?[^'\"\\s]{8,}|CRITICAL"
      "DB Password|db_password['\"]?\s*[:=]\s*['\"]?[^'\"\\s]{8,}|CRITICAL"
      
      # ========== HIGH SEVERITY (Block with override option) ==========
      # API Keys and Tokens
      "GitHub Personal Access Token|ghp_[a-zA-Z0-9]{36}|HIGH"
      "GitHub OAuth Token|gho_[a-zA-Z0-9]{36}|HIGH"
      "GitHub App Token|ghu_[a-zA-Z0-9]{36}|HIGH"
      "Stripe API Key|sk_(live|test)_[a-zA-Z0-9]{24,}|HIGH"
      "Stripe Restricted Key|rk_(live|test)_[a-zA-Z0-9]{24,}|HIGH"
      "OpenAI API Key|sk-[a-zA-Z0-9]{48}|HIGH"
      "Anthropic API Key|sk-ant-[a-zA-Z0-9]{95}|HIGH"
      "Slack Token|xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,}|HIGH"
      "Slack Webhook|https://hooks\.slack\.com/services/T[A-Z0-9]{8}/B[A-Z0-9]{8}/[a-zA-Z0-9]{24}|HIGH"
      
      # Generic API Patterns
      "API Key Generic|api[_-]?key['\"]?\s*[:=]\s*['\"]?[a-zA-Z0-9]{20,}|HIGH"
      "API Secret|api[_-]?secret['\"]?\s*[:=]\s*['\"]?[a-zA-Z0-9]{20,}|HIGH"
      "Access Token|access[_-]?token['\"]?\s*[:=]\s*['\"]?[a-zA-Z0-9]{20,}|HIGH"
      
      # JWT Tokens
      "JWT Token|eyJ[a-zA-Z0-9_-]+\.eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+|HIGH"
      
      # Cloud Provider Keys
      "Google API Key|AIza[0-9A-Za-z_-]{35}|HIGH"
      "Azure Client Secret|client_secret['\"]?\s*[:=]\s*['\"]?[a-zA-Z0-9~_.-]{34}|HIGH"
      
      # ========== MEDIUM SEVERITY (Warn only) ==========
      # Generic Passwords (may catch test fixtures)
      "Password Assignment|password['\"]?\s*[:=]\s*['\"]?[^'\"\\s]{8,}|MEDIUM"
      "Secret Assignment|secret['\"]?\s*[:=]\s*['\"]?[^'\"\\s]{8,}|MEDIUM"
      
      # ========== CUSTOM PATTERNS SECTION ==========
      # Add your organization-specific patterns here:
      # "Description|regex_pattern|SEVERITY"
      # Examples:
      # "Internal API Key|internal_api_[a-z0-9]{32}|CRITICAL"
      # "Custom Token|MYCOMPANY[A-Z0-9]{20}|HIGH"
    )
    
    # Track findings
    FINDINGS=0
    CRITICAL_FINDINGS=0
    HIGH_FINDINGS=0
    MEDIUM_FINDINGS=0
    
    # Create temporary findings file
    FINDINGS_FILE=$(mktemp)
    trap "rm -f $FINDINGS_FILE" EXIT
    
    # Scan each pattern
    for pattern_spec in "${PATTERNS[@]}"; do
      IFS='|' read -r description pattern severity <<< "$pattern_spec"
      
      # Find all matching files (excluding .git, node_modules, etc.)
      FILES=$(find $SCAN_PATHS -type f \
        ! -path "*/\.git/*" \
        ! -path "*/node_modules/*" \
        ! -path "*/vendor/*" \
        ! -path "*/.next/*" \
        ! -path "*/dist/*" \
        ! -path "*/build/*" \
        2>/dev/null || true)
      
      if [ -z "$FILES" ]; then
        continue
      fi
      
      # Search for pattern in files
      # Use grep with perl regex for advanced patterns
      while IFS= read -r file; do
        if [ -f "$file" ]; then
          # Search with line numbers, case-insensitive
          matches=$(grep -nPi "$pattern" "$file" 2>/dev/null || true)
          
          if [ -n "$matches" ]; then
            # Check for whitelist comments
            while IFS= read -r match; do
              line_num=$(echo "$match" | cut -d: -f1)
              line_content=$(echo "$match" | cut -d: -f2-)
              
              # Skip if line has whitelist marker
              if echo "$line_content" | grep -qE "(# nosecret|# secret:allow|# gitleaks:allow)"; then
                continue
              fi
              
              # Record finding
              echo "$severity|$description|$file:$line_num|$(echo "$line_content" | head -c 100)" >> "$FINDINGS_FILE"
              FINDINGS=$((FINDINGS + 1))
              
              case "$severity" in
                CRITICAL) CRITICAL_FINDINGS=$((CRITICAL_FINDINGS + 1)) ;;
                HIGH) HIGH_FINDINGS=$((HIGH_FINDINGS + 1)) ;;
                MEDIUM) MEDIUM_FINDINGS=$((MEDIUM_FINDINGS + 1)) ;;
              esac
            done <<< "$matches"
          fi
        fi
      done <<< "$FILES"
    done
    
    # Report findings
    if [ $FINDINGS -eq 0 ]; then
      echo "✅ No secrets detected - safe to proceed"
      exit 0
    fi
    
    # Display findings by severity
    echo ""
    echo "=========================================="
    echo "❌ SECRETS DETECTED - Context blocked"
    echo "=========================================="
    echo ""
    echo "Summary:"
    echo "  CRITICAL: $CRITICAL_FINDINGS"
    echo "  HIGH:     $HIGH_FINDINGS"
    echo "  MEDIUM:   $MEDIUM_FINDINGS"
    echo "  TOTAL:    $FINDINGS"
    echo ""
    
    # Show critical findings first
    if [ $CRITICAL_FINDINGS -gt 0 ]; then
      echo "🔴 CRITICAL FINDINGS (Must fix):"
      grep "^CRITICAL|" "$FINDINGS_FILE" | while IFS='|' read -r sev desc location content; do
        echo "  [$desc]"
        echo "    Location: $location"
        echo "    Content:  ${content:0:80}..."
        echo ""
      done
    fi
    
    # Show high severity findings
    if [ $HIGH_FINDINGS -gt 0 ]; then
      echo "🟠 HIGH SEVERITY FINDINGS:"
      grep "^HIGH|" "$FINDINGS_FILE" | while IFS='|' read -r sev desc location content; do
        echo "  [$desc]"
        echo "    Location: $location"
        echo "    Content:  ${content:0:80}..."
        echo ""
      done
    fi
    
    # Show medium severity findings
    if [ $MEDIUM_FINDINGS -gt 0 ]; then
      echo "🟡 MEDIUM SEVERITY FINDINGS (Warnings):"
      grep "^MEDIUM|" "$FINDINGS_FILE" | while IFS='|' read -r sev desc location content; do
        echo "  [$desc]"
        echo "    Location: $location"
        echo ""
      done
    fi
    
    echo "=========================================="
    echo "How to fix:"
    echo "  1. Remove secrets from code"
    echo "  2. Use environment variables or secret management"
    echo "  3. For false positives: add '# nosecret' comment"
    echo ""
    echo "Example whitelist:"
    echo "  const EXAMPLE = 'AKIAIOSFODNN7EXAMPLE' // nosecret"
    echo "=========================================="
    
    # Block if critical or high severity findings
    if [ $CRITICAL_FINDINGS -gt 0 ] || [ $HIGH_FINDINGS -gt 0 ]; then
      exit 1
    fi
    
    # Warn for medium severity
    if [ $MEDIUM_FINDINGS -gt 0 ]; then
      echo "⚠️  Medium severity findings detected - review before proceeding"
      exit 0
    fi

on_failure: block_context
# Prevents file with detected secrets from being sent to model

# COMPARISON WITH GITLEAKS:
# Pros:
#   - Zero dependencies (works everywhere)
#   - Extremely fast (~10x faster than gitleaks)
#   - Easy to customize patterns
#   - Simple to understand and debug
#
# Cons:
#   - More false positives (less sophisticated matching)
#   - Manual pattern maintenance required
#   - No entropy analysis (gitleaks can detect high-entropy strings)
#   - No built-in pattern updates (gitleaks auto-updates)
#
# RECOMMENDATION:
# - Use this for fast development feedback
# - Use scan-secrets.yaml (gitleaks) for comprehensive pre-commit validation
# - Run both for maximum coverage

# SECURITY NOTES:
# - All scanning is local (no network calls)
# - Safe to run on sensitive codebases
# - Compliant with data residency requirements
# - Can be audited (pure bash, no binary dependencies)
