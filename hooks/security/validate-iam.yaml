# Security Hook: IAM Policy Validation
#
# PURPOSE: Validate AWS IAM policies for security best practices.
#          Detects wildcard actions/resources, missing conditions, overly permissive policies.
#          Helps prevent privilege escalation and lateral movement attack vectors.
#
# REQUIREMENTS ADDRESSED:
# - 3.3: IAM policy validation for wildcards and missing conditions
# - 3.7: Inline customization guidance
# - 15.2: Clear customization points
#
# ============================================================================
# CUSTOMIZATION GUIDE
# ============================================================================
#
# NO INSTALLATION REQUIRED - Uses jq for JSON parsing (usually pre-installed)
#
# REQUIRED CHANGES:
# 1. Update POLICY_PATHS to match where your IAM policies are defined:
#    - CloudFormation: templates/**, cloudformation/**
#    - Terraform: *.tf, terraform/**
#    - CDK: cdk/**, lib/**, infra/**
#    - Raw JSON: policies/**, iam/**
#
# OPTIONAL CHANGES:
# 2. Adjust severity rules (see SEVERITY CONFIGURATION section):
#    - Add allowed wildcards for your org (e.g., read-only s3:Get*)
#    - Define custom high-risk actions (e.g., organization management)
#    - Configure resource prefix requirements (e.g., all resources must start with company prefix)
#
# 3. Condition requirement rules:
#    - Define which actions MUST have condition blocks (e.g., MFA for privilege escalation)
#    - Add IP restriction requirements
#    - Specify required condition keys (aws:PrincipalOrgID, aws:SourceIp, etc.)
#
# 4. False positive handling:
#    - Use inline comments: // iam:allow-wildcard - reason: read-only bucket listing
#    - Configure exceptions in ALLOWED_WILDCARDS array
#
# VALIDATION:
# - Run: bash hooks/security/validate-iam.yaml
# - Test with sample policy containing wildcards
# - Verify severity classification matches expectations
#
# EXAMPLES:
# - Allow read-only wildcards: s3:Get*, s3:List*, ec2:Describe*
# - Require MFA for privilege escalation: iam:AttachUserPolicy, iam:PutUserPolicy
# - Require IP conditions for sensitive actions: iam:DeleteUser, iam:DeleteRole
# ============================================================================

name: validate-iam-policies
description: |
  Validates AWS IAM policies for security best practices:
  - Detects wildcard actions (Action: "*") and resources (Resource: "*")
  - Identifies missing condition blocks on sensitive actions
  - Flags privilege escalation vectors
  - Distinguishes severity: block critical violations, warn on risky patterns
  - Allows read-only wildcards as safe patterns

on:
  file_save:
    # CUSTOMIZE: Adjust to where IAM policies are defined in your repo
    paths:
      # CloudFormation templates
      - "**/templates/**/*.yaml"
      - "**/templates/**/*.yml"
      - "**/templates/**/*.json"
      - "**/cloudformation/**/*.yaml"
      - "**/cloudformation/**/*.yml"
      - "**/cloudformation/**/*.json"
      
      # Terraform
      - "**/*.tf"
      - "**/terraform/**/*.tfvars"
      
      # CDK
      - "**/cdk/**/*.ts"
      - "**/cdk/**/*.js"
      - "**/lib/**/*-stack.ts"
      - "**/infra/**/*.ts"
      
      # Raw IAM policy files
      - "**/policies/**/*.json"
      - "**/iam/**/*.json"
      
      # Infrastructure as Code
      - "**/infrastructure/**/*.yaml"
      - "**/infrastructure/**/*.yml"

run:
  agent: sonnet
  # Uses model for sophisticated policy analysis and context understanding
  
  task: |
    You are an AWS IAM security auditor. Analyze IAM policies for security violations.
    
    ============================================================================
    SEVERITY CONFIGURATION
    ============================================================================
    
    CRITICAL (Block immediately):
    1. Action: "*" with Resource: "*" (full admin access)
    2. Action: "*" without any condition blocks
    3. Resource: "*" for high-risk actions:
       - iam:PassRole, iam:AttachRolePolicy, iam:PutRolePolicy
       - sts:AssumeRole without condition constraints
       - iam:CreateAccessKey, iam:UpdateAccessKey
       - lambda:InvokeFunction with * (arbitrary code execution)
       - s3:PutBucketPolicy with * (data exfiltration vector)
    4. Privilege escalation patterns:
       - iam:AttachUserPolicy + iam:CreatePolicy (can grant self admin)
       - iam:PutUserPolicy without condition (inline policy abuse)
       - iam:UpdateAssumeRolePolicy (can assume any role)
    
    HIGH (Warn, recommend fixing):
    1. Action wildcards with partial resource constraints:
       - s3:* on Resource: "arn:aws:s3:::bucket/*" (overly broad)
       - ec2:* on Resource: "*" (unscoped infrastructure access)
       - dynamodb:* on table resources (excessive table permissions)
    2. Resource wildcards for data access:
       - s3:GetObject on Resource: "*" (can read any bucket)
       - dynamodb:GetItem on Resource: "*" (can read any table)
       - sqs:ReceiveMessage on Resource: "*" (can consume any queue)
    3. Missing conditions on sensitive actions:
       - sts:AssumeRole without aws:PrincipalOrgID or aws:SourceIp
       - iam:* actions without MFA condition (aws:MultiFactorAuthPresent)
       - kms:Decrypt without kms:EncryptionContext
    
    MEDIUM (Warn, consider refining):
    1. Wildcard actions with resource prefix constraints:
       - s3:* on Resource: "arn:aws:s3:::company-*/*" (scoped to company buckets)
       - dynamodb:* on Resource: "arn:aws:dynamodb:*:*:table/app-*" (scoped to app tables)
    2. Cross-account access without external ID:
       - sts:AssumeRole with Principal: AWS: "arn:aws:iam::123456789012:root"
       - Missing externalId condition (session injection risk)
    
    LOW (Informational, safe patterns):
    1. Read-only wildcard actions (ALLOWED):
       - s3:Get*, s3:List*
       - ec2:Describe*, ec2:List*
       - iam:Get*, iam:List*
       - cloudwatch:Get*, cloudwatch:Describe*
       - logs:Describe*, logs:Get*
    2. Scoped wildcards with explicit deny:
       - Policy has explicit Deny statement limiting scope
    
    ============================================================================
    ANALYSIS INSTRUCTIONS
    ============================================================================
    
    For each IAM policy found:
    
    1. Extract and parse the policy document:
       - CloudFormation: Look for AWS::IAM::Role, AWS::IAM::Policy resources
       - Terraform: Look for aws_iam_role, aws_iam_policy resources
       - CDK: Look for iam.PolicyStatement, iam.Role constructs
       - Raw JSON: Parse the policy document directly
    
    2. For each policy statement:
       a) Check Action field:
          - Flag "*" wildcards (except read-only patterns)
          - Flag service-level wildcards (s3:*, iam:*, ec2:*)
          - Identify privilege escalation action combinations
       
       b) Check Resource field:
          - Flag "*" resources (global access)
          - Check if resource constraints are meaningful
          - Verify resource ARN patterns match expected scope
       
       c) Check Condition field:
          - Flag missing conditions on sensitive actions
          - Verify MFA requirements for privilege escalation
          - Check IP restrictions for cross-account access
          - Validate external ID for cross-account assume role
    
    3. Apply severity rules:
       - CRITICAL: Block the file from being sent to model
       - HIGH: Warn prominently but allow with recommendation to fix
       - MEDIUM: Warn with suggestion to review
       - LOW: Informational note, safe to proceed
    
    4. Output format:
       For each finding, report:
       ```
       [SEVERITY] Finding Type
       File: <file path>
       Line: <line number if available>
       
       Issue: <specific problem>
       Risk: <security impact>
       Recommendation: <how to fix>
       
       Example fix:
       <code showing corrected policy>
       ```
    
    5. Whitelist handling:
       - Check for inline comments: // iam:allow-wildcard - reason: <justification>
       - If whitelist comment present, downgrade severity to LOW
       - Include whitelist rationale in report
    
    ============================================================================
    EXAMPLE OUTPUTS
    ============================================================================
    
    CRITICAL Example:
    ```
    [CRITICAL] Unrestricted Admin Access
    File: infrastructure/backend-role.yaml
    Line: 23
    
    Issue: Policy grants Action: "*" with Resource: "*"
    Risk: Complete AWS account access - privilege escalation, lateral movement, data exfiltration
    Recommendation: Apply principle of least privilege - grant only required actions on specific resources
    
    Example fix:
    PolicyDocument:
      Statement:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource: 
            - !Sub "arn:aws:s3:::${DataBucket}/*"
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
          Resource: 
            - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}"
    ```
    
    HIGH Example:
    ```
    [HIGH] Missing MFA Condition on Privilege Escalation
    File: iam/admin-policy.json
    Line: 45
    
    Issue: iam:AttachUserPolicy action without aws:MultiFactorAuthPresent condition
    Risk: Attacker with stolen credentials can grant themselves admin without MFA
    Recommendation: Require MFA for all IAM privilege escalation actions
    
    Example fix:
    {
      "Effect": "Allow",
      "Action": "iam:AttachUserPolicy",
      "Resource": "*",
      "Condition": {
        "Bool": {
          "aws:MultiFactorAuthPresent": "true"
        }
      }
    }
    ```
    
    MEDIUM Example:
    ```
    [MEDIUM] Broad Wildcard with Partial Constraints
    File: cdk/data-pipeline-stack.ts
    Line: 67
    
    Issue: s3:* action with resource scoped to company prefix
    Risk: Overly broad permissions - can delete, modify bucket policies within scope
    Recommendation: Restrict to specific actions needed (GetObject, PutObject, ListBucket)
    
    Example fix:
    new iam.PolicyStatement({
      effect: iam.Effect.ALLOW,
      actions: [
        's3:GetObject',
        's3:PutObject',
        's3:ListBucket'
      ],
      resources: [
        `arn:aws:s3:::company-${env}-*`,
        `arn:aws:s3:::company-${env}-*/*`
      ]
    })
    ```
    
    LOW Example (Allowed):
    ```
    [LOW] Read-Only Wildcard (Safe Pattern)
    File: iam/monitoring-role.yaml
    Line: 12
    
    Issue: ec2:Describe* and cloudwatch:Get* wildcards
    Risk: Minimal - read-only access cannot modify infrastructure
    Note: This is a safe pattern for monitoring and observability roles
    ```
    
    ============================================================================
    CONTEXT FOR ANALYSIS
    ============================================================================
    
    Changed files: ${KIRO_CHANGED_FILES}
    
    Focus your analysis on IAM policies in these files. Look for:
    - CloudFormation: AWS::IAM::Role, AWS::IAM::Policy, AWS::IAM::ManagedPolicy
    - Terraform: aws_iam_role, aws_iam_policy, aws_iam_role_policy
    - CDK: PolicyStatement, Role, ManagedPolicy classes
    - Raw JSON: IAM policy documents with Version, Statement fields
    
    If no IAM policies are found, output:
    "✅ No IAM policies detected in changed files"
    
    If policies are found but all are compliant:
    "✅ IAM policies validated - no security violations detected"
    
    Always prioritize security over convenience. When in doubt, flag as HIGH severity.

  approval: none
  # Automated validation - no human approval needed for analysis

on_failure: warn
# warn: Log findings but allow file to be sent to model
# Model can provide remediation suggestions based on the findings
# Change to "block_context" if you want stricter enforcement (blocks file on CRITICAL findings)

# INTEGRATION NOTES:
# - Combine with scan-secrets.yaml to prevent IAM access keys in code
# - Use with pre-send-scan.yaml for final validation before model sees policy
# - Consider CI/CD integration for additional enforcement layer
#
# PERFORMANCE:
# - Model analysis typically completes in 3-10 seconds depending on policy complexity
# - Local regex pre-filtering can speed up processing (optional enhancement)
#
# COMPLIANCE:
# - Helps satisfy principle of least privilege (PCI DSS, SOX, ISO 27001)
# - Provides audit trail of policy reviews
# - Supports compliance with CIS AWS Foundations Benchmark
#
# FALSE POSITIVES:
# - Monitoring roles legitimately need Describe*/Get*/List* wildcards
# - Some AWS services require PassRole with * resource (e.g., ECS task execution)
# - Use inline whitelist comments for documented exceptions
